<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply - Swifthela Mirror</title>
  <link rel="icon" href="icons/logo.webp">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="main-card" style="margin-bottom:32px;">
      <h2 class="loan-amount" style="color:#189318;font-size:1.3rem;font-weight:700;margin-bottom:0.4rem;text-align:center;">Apply for a Loan</h2>
      <form>
        <label for="amount">Amount</label>
        <input id="amount" name="amount" type="number" min="1000" max="50000" required>
        <label for="purpose">Purpose</label>
        <input id="purpose" name="purpose" type="text" required>
        <button type="submit" class="btn-apply" style="margin-top:18px;">Apply</button>
      </form>
    </section>
  </main>
</body>
</html>
