<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eligibility - Swifthela Mirror</title>
  <link rel="icon" href="icons/logo.webp">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="main-card" style="margin-bottom:32px;">
      <h2 class="loan-amount" style="color:#189318;font-size:1.3rem;font-weight:700;margin-bottom:0.4rem;text-align:center;">Check Eligibility</h2>
      <form>
        <label for="age">Age</label>
        <input id="age" name="age" type="number" min="18" max="35" required>
        <label for="id">National ID</label>
        <input id="id" name="id" type="text" required>
        <label for="county">County</label>
        <input id="county" name="county" type="text" required>
        <button type="submit" class="btn-apply" style="margin-top:18px;">Check</button>
      </form>
    </section>
  </main>
</body>
</html>
