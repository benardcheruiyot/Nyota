<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swifthela Mirror</title>
  <link rel="icon" href="icons/logo.webp">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="modal.css">
</head>
<body>
  <main class="container" aria-labelledby="main-title">
    <section class="main-card" aria-labelledby="loan-amount-title" style="margin-bottom:32px;">
      <h2 class="loan-amount" id="loan-amount-title" style="color:#189318;font-size:1.7rem;font-weight:700;margin-bottom:0.4rem;">Ksh. 1,000 - 50,000</h2>
      <div class="loan-subtext" style="color:#666;font-size:0.95rem;margin-bottom:0.9rem;font-weight:500;">Youth empowerment financing available nationwide</div>
      <div class="feature-badges" style="display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;justify-items:center;margin:12px 0 12px 0;">
        <div class="feature-badge" style="background:#f1f8f4;border-radius:11px;padding:15px 0;width:97%;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:#0a7a2a;font-size:0.98rem;"><img src="icons/bolt.svg" alt="Fast approval" class="icon-svg" style="width:20px;height:20px;"> Fast approval</div>
        <div class="feature-badge" style="background:#f1f8f4;border-radius:11px;padding:15px 0;width:97%;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:#0a7a2a;font-size:0.98rem;"><img src="icons/phone.svg" alt="Paperless" class="icon-svg" style="width:20px;height:20px;"> Paperless</div>
        <div class="feature-badge" style="background:#f1f8f4;border-radius:11px;padding:15px 0;width:97%;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:#0a7a2a;font-size:0.98rem;"><img src="icons/shield.svg" alt="Secure" class="icon-svg" style="width:20px;height:20px;"> Secure</div>
        <div class="feature-badge" style="background:#f1f8f4;border-radius:11px;padding:15px 0;width:97%;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:#0a7a2a;font-size:0.98rem;"><img src="icons/user.svg" alt="Youth-focused" class="icon-svg" style="width:20px;height:20px;"> Youth-focused</div>
      </div>
    </section>
    <section class="cta-section" style="margin-bottom:32px;">
      <a href="eligibility.html" class="btn-apply" aria-label="Apply for a loan" style="font-size:1.08rem;font-weight:800;padding:14px 0;display:block;text-align:center;color:#fff;text-decoration:none;letter-spacing:0.5px;">
        Apply Now <span class="arrow" aria-hidden="true">→</span>
      </a>
    </section>
    <section class="trust-section" aria-labelledby="trust-title" style="margin-bottom:32px;">
      <div class="trust-title" id="trust-title" style="text-align:center;color:#888;font-size:0.92rem;margin-bottom:8px;">Your security is our priority</div>
      <div class="trust-badges" aria-label="Trust Badges" style="display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;justify-items:center;">
        <div class="trust-badge" style="background:#f1f8f4;border-radius:11px;padding:11px 0;width:97%;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:#0a7a2a;font-size:0.98rem;"><img src="icons/lock.svg" alt="SSL Secured" class="icon-svg" style="width:18px;height:18px;"> SSL Secured</div>
        <div class="trust-badge" style="background:#f1f8f4;border-radius:11px;padding:11px 0;width:97%;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:#0a7a2a;font-size:0.98rem;"><img src="icons/badge.svg" alt="Licensed Program" class="icon-svg" style="width:18px;height:18px;"> Licensed Program</div>
        <div class="trust-badge" style="background:#f1f8f4;border-radius:11px;padding:11px 0;width:97%;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:#0a7a2a;font-size:0.98rem;"><img src="icons/data.svg" alt="Data Protected" class="icon-svg" style="width:18px;height:18px;"> Data Protected</div>
        <div class="trust-badge" style="background:#f1f8f4;border-radius:11px;padding:11px 0;width:97%;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:700;color:#0a7a2a;font-size:0.98rem;"><img src="icons/group.svg" alt="Trusted" class="icon-svg" style="width:18px;height:18px;"> Trusted</div>
      </div>
      <div class="trust-note" style="text-align:center;color:#888;font-size:0.89rem;margin-top:8px;font-weight:500;">Empowering thousands of Kenyan youth</div>
    </section>
  </main>
</body>
<script>
</script>
</html>
